<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>缅邮总包条码解析工具</title>
<style>
    body {
        font-family: Arial;
        max-width: 800px;
        margin: 40px auto;
        background: #f5f5f5;
    }
    h2 { text-align: center; }
    input {
        width: 100%;
        padding: 10px;
        font-size: 16px;
        margin-bottom: 10px;
    }
    button {
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
    }
    pre {
        background: #222;
        color: #0f0;
        padding: 15px;
        margin-top: 20px;
    }
</style>
</head>
<body>

<h2>📦缅邮总包条码解析工具</h2>

<input id="barcode" placeholder="请输入30位条码">
<button onclick="parseBarcode()">解析</button>

<pre id="output"></pre>

<script>
const BAG_TYPE_MAP = {
    "111": "国际特快",
    "121": "国内特快",
    "141": "次晨达",
    "212": "国际平信",
    "222": "国际挂信",
    "232": "国际平刷",
    "263": "国际挂刷",
    "283": "国际包裹",
    "411": "平常信函",
    "421": "给据信函",
	"422": "给据商函",
    "711": "给据印刷品",
    "741": "给据印刷品",
    "811": "快递包裹",
    "821": "普通包裹",
    "931": "平常邮袋",
    "932": "给据邮袋",
    "955": "空袋"
};

const DIRECTION_MAP = {
    "1": "本转不分",
    "2": "本口",
	"3": "转口"
};

function parseBarcode() {
    const barcode = document.getElementById("barcode").value.trim();
    const out = document.getElementById("output");

    if (barcode.length !== 30 || !/^\d+$/.test(barcode)) {
        out.textContent = "你局严重违规！条码必须为30位纯数字，请核验！如有投诉，你局全责！";
        return;
    }

    const directionCode = barcode[16];
    const bagCode = barcode.slice(17, 20);

    const result = {
        "发出局机构代码": barcode.slice(0, 8),
        "接收局机构代码": barcode.slice(8, 16),
        "封发类型": (DIRECTION_MAP[directionCode] || "未知") + ` (${directionCode})`,
        "总包类型": (BAG_TYPE_MAP[bagCode] || "未知") + ` (${bagCode})`,
        "总包条码": barcode.slice(20, 24),
        "重量(克)": parseInt(barcode.slice(24, 28)),
        "容器型号代码": barcode[28],
        "备注标志": barcode[29]
    };

    let text = "📦 解析结果：\n\n";
    for (let k in result) {
        text += k + "：" + result[k] + "\n";
    }

    out.textContent = text;
}


</script>

</body>
</html>
